services:
  - type: web
    name: propfirmsearch-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /propfirmsearch.html
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: RELOAD
        value: "0"
